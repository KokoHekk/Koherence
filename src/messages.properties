//wakeUpScene=
wake.morning.day0=Eyes open to crisp morning light. White hair tangled across pillow. Fox ears perk at distant birds.
wake.morning.day1=Sun filters through curtains warmer today. Hair sticks to cheek. Ears catch kitchen clatter below.
wake.morning.day2=Cool sheets cling. Hair fans wild. Ears twitch at sharp metallic sounds from training room.
wake.morning.day3=Balcony breeze sneaks through window. Hair lifts slightly. Ears hear faint pops from yesterday's paintballs.
wake.morning.day4=Soap scent lingers from laundry. Hair smooth from yesterday. Ears catch dryer hum downstairs.
wake.morning.day5=Quiet morning. Hair neat. Ears strain for world beyond balcony railing.
wake.morning.day6=Anticipation heavy in air. Hair brushed already? Ears catch caretaker's hurried steps.
wake.morning.day7=Final morning tension. Hair perfect. Ears hear low voices planning guest arrival.
wake.morning.default=Eyes open to familiar ceiling. White hair spills across pillow. Fox ears twitch.

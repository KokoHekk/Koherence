//day1Cleaning=
day1.start=\n"Let's start simple. Clean one room thoroughly."
day1.room.prompt=Room? [kitchen/living/dining/laundry/foyer/bath/balcony/master]
day1.master.access=\nKey turns smoothly in Master Bedroom lock.
day1.master.denied.door=\nMaster Bedroom door. Caretaker appears immediately.
day1.master.denied.voice="Not that room, Ko." Voice sharp.
day1.master.denied.walk="Sorry," you say nervously and begin to walk away.
day1.invalid.room=Invalid room choice.
clean.kitchen.desc=\nKitchen smells of grease and old food.\nCounters are sticky. Stove has burnt spots. Sink is full of dishes.
clean.kitchen.prompt=What first? [counters/stove/sink/floor/done]
clean.kitchen.counters=You scrub the counters clean. They shine now.\nYour white hair falls in your face.
clean.kitchen.stove=Burnt spots are hard to clean. Your tail moves back and forth.\nFinally the stove looks better.
clean.kitchen.sink=Plates slip in soapy water.\n"Be careful, Ko," the caretaker calls from the hall.
clean.kitchen.floor=You get on your knees to clean the floor.\nYour fox ears twitch at every sound.
clean.kitchen.snack=\nYour stomach growls. Make a snack? [yes/no]
clean.kitchen.snack.prompt=[yes/no]
clean.kitchen.snack.yes=You make a sandwich. The male walks by.\n"Hungry work," he says quietly.
clean.living.desc=\nLiving room has dust on shelves and furniture.\nWindows are streaky. The plant looks dry.
clean.living.prompt=Clean what? [shelves/furniture/windows/plant/done]
clean.living.shelves.clean=Shelves are clean now. The plant seems to watch you.
clean.living.shelves.clumsy=\nYour arm hits the plant. Dirt spills everywhere.\nWhile cleaning it up, you find a small key in the soil.
clean.living.key.prompt=Keep the key? [keep/return]
clean.living.key.keep=You put the key in your pocket.
clean.living.key.return=You put the key back in the dirt.
clean.living.windows=You clean the windows. You can see outside clearly now.
clean.living.furniture=Furniture shines after you polish it.
clean.dining.desc=\nDining room table is dusty. Chairs need wiping.\nChandelier has dust hanging from it.
clean.dining.prompt=What to clean? [table/chairs/chandelier/silver/done]
clean.dining.table=Table is clean and shiny now.\n"Good for guests someday," the caretaker says.
clean.dining.chandelier=Dust falls from the chandelier as you clean it.
clean.dining.silver=Silverware sparkles after polishing.
clean.laundry.desc=\nLaundry room smells like soap. Clothes need sorting.
clean.laundry.prompt=What to do? [washer/dryer/folding/sorting/done]
clean.laundry.sorting=One shirt smells like trees and wind.\nYou shake your head. Just your imagination.
clean.laundry.folding=Folding clothes calms you down.
clean.foyer.desc=\nFoyer floor is dirty. Front door needs polishing.
clean.foyer.prompt=Clean what? [floor/coats/door/mail/done]
clean.foyer.door=You polish the door handle. You try the knob. It's locked.\nThe caretaker appears. "Not that door, Ko."
clean.bath.desc=\nBathroom sink is grimy. Mirror is foggy.
clean.bath.prompt=Clean what? [sink/tub/mirror/tiles/done]
clean.bath.mirror=You see yourself in the mirror.\nWhite hair, fox ears, confused eyes.
clean.balcony.desc=\nBalcony railing is rusty. You can see outside from here.
clean.balcony.prompt=What to do? [railing/chairs/plants/stare/done]
clean.balcony.stare=You look at the world outside.\nYour tail wants to go there. You stay put.

//day2CookingLesson=
day2.intro=\nThe caretaker sets carrots and onions on the counter.
day2.lesson="Cooking lesson, Ko. Watch closely."
day2.demo=Her knife moves smoothly. Vegetables fall into perfect pieces.
day2.first.prompt="Ready to try?" [try/watch more]
day2.try.take=\nYou take the knife. Grip feels awkward.
day2.try.guide="Wrist down, roll forward," she guides your hand.
day2.try.second.prompt=Try now? [chop/no thanks]
day2.try.chop=\nChops uneven but food cooks.
day2.try.good="Good first try," she smiles warmly.
day2.try.no=\n"I would rather not, sorry."
day2.try.fine=Her smile tightens slightly. "That's fine. Tomorrow then."
day2.watch.ask=\n"Could I watch a few more times?"
day2.watch.demo=She demonstrates again, slower.
day2.watch.follow.prompt="Try after seeing?" [try/no]
day2.watch.try=\nKnife feels surer. Chops better.
day2.watch.see="See? Practice works," she nods.
day2.watch.no=\n"No thanks."
day2.watch.suit="Suit yourself," she says lightly.
day2.end.sizzle=\nFood sizzles. Smells good.
day2.end.lunch="Lunch is ready. You helped make it."

//day3KnifeTraining=
day3.intro=\n"Animals sometimes wander close, Ko."
day3.explain="Wild dogs, coyotes. You need to know this."
day3.demo=She hands wooden knife. "Grip like hammer. Firm but wrist loose."
day3.first.prompt="Feel the grip." [try/sounds scary]
day3.try.firm=\nKnife firm in fist. Feels solid.
day3.try.stance="Good. Now for the stance. Feet apart, knife high for throat."
day3.try.second.prompt=Target? [throat/high]
day3.try.thrust=\nYou thrust forward. Air parts clean.
day3.try.perfect="Perfect for coyote! Eyes or throat," she beams.
day3.try.too.high=\n"Too high." She lowers your arm gently.
day3.try.low="Animals duck. Go low?groin, belly."
day3.scary.response=\n"Sounds scary."
day3.scary.comfort="I know, sweetheart. That's why we practice."
day3.scary.demo=She demonstrates slow thrust?slice.
day3.scary.follow.prompt="Your turn?" [try/later]
day3.scary.try=\nKnife shakes but you thrust. "Better than nothing."
day3.end.distance="Distance is safety. Slice coming, thrust going."
day3.end.need="One day you'll need this." Knife feels real now.

